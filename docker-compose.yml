services:
  gftp:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: darthsoup/goblinftp
    ports:
      - "8080:80"
    environment:
      GFTP_PAGE_TITLE: "${GFTP_PAGE_TITLE:-GoblinFTP}"
      GFTP_SESSION_SECRET: "${GFTP_SESSION_SECRET:-}"
      GFTP_DOWNLOAD_TOKEN_SECRET: "${GFTP_DOWNLOAD_TOKEN_SECRET:-}"
      GFTP_SSO_ENABLED: "${GFTP_SSO_ENABLED:-false}"
      GFTP_SSO_SECRET: "${GFTP_SSO_SECRET:-}"
      GFTP_SENTRY_DSN: "${GFTP_SENTRY_DSN:-}"
    # Uncomment to mount custom settings:
    # volumes:
    #   - ./settings.json:/app/settings.json:ro
    restart: unless-stopped

  ftp:
    image: garethflowers/ftp-server:latest
    environment:
      FTP_USER: "${FTP_USER:-ftpuser}"
      FTP_PASS: "${FTP_PASS:-ftppass}"
      PUBLIC_IP: "${PUBLIC_IP:-127.0.0.1}"
    ports:
      - "20-21:20-21/tcp"
      - "40000-40009:40000-40009/tcp"
    volumes:
      - ftp-data:/home/ftpuser
    profiles:
      - testing

volumes:
  ftp-data:
