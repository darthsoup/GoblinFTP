# Shapes GitHub's auto-generated release-notes section (PR-label based).
# The primary notes are commit-grouped by release.yml; this config kicks in
# once changes start landing via labeled pull requests.
changelog:
  exclude:
    authors:
      - dependabot
      - dependabot[bot]
      - github-actions
      - github-actions[bot]
  categories:
    - title: Features
      labels: ["feature", "enhancement"]
    - title: Fixes
      labels: ["bug", "fix"]
    - title: Maintenance
      labels: ["chore", "dependencies", "ci", "docs"]
    - title: Other
      labels: ["*"]
