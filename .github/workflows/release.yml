name: Release

# Releasing: git tag v0.2.0 && git push --tags
# → gates (tests + lint + frontend build)
# → multi-arch image to ghcr.io with semver tags + latest
# → GitHub Release with commit-grouped notes.
on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  # No cancel-in-progress: never interrupt a release mid-publish.

jobs:
  checks:
    uses: ./.github/workflows/checks.yml

  publish:
    name: Publish image
    runs-on: ubuntu-latest
    needs: [checks]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # flavor.latest defaults to auto: `latest` is added for semver tags but
      # correctly skipped for prereleases (v1.0.0-rc1) — do not force it.
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # VERSION (the tag, e.g. v0.2.0) → -X main.version → startup log,
      # /healthz, /api/system/vars, settings modal, default Sentry release.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [publish]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for git describe + the log range

      # Commits land directly on main, so GitHub's PR-based notes would be
      # empty — group commit subjects by conventional prefix instead.
      - name: Build commit-grouped release notes
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          PREV="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          if [ -n "$PREV" ]; then RANGE="${PREV}..${TAG}"; else RANGE="$TAG"; fi
          LOG="$(git log --no-merges --pretty=format:'%h %s' "$RANGE")"

          emit_group() { # $1 heading, $2 prefix regex
            local body
            body="$(printf '%s\n' "$LOG" | grep -E "$2" \
              | sed -E 's/^([0-9a-f]+) (feat|fix|chore)(\([^)]*\))?(!)?: */\1 /' \
              | sed -E 's/^([0-9a-f]+) (.*)$/- \2 (`\1`)/' || true)"
            [ -n "$body" ] && printf '### %s\n\n%s\n\n' "$1" "$body" || true
          }
          emit_other() {
            local body
            body="$(printf '%s\n' "$LOG" | grep -Ev '^[0-9a-f]+ (feat|fix|chore)(\([^)]*\))?(!)?: ' \
              | sed -E 's/^([0-9a-f]+) (.*)$/- \2 (`\1`)/' || true)"
            [ -n "$body" ] && printf '### Other\n\n%s\n\n' "$body" || true
          }

          {
            if [ -n "$PREV" ]; then printf '_Changes since %s._\n\n' "$PREV"; else printf '_Initial release._\n\n'; fi
            emit_group "Features"    '^[0-9a-f]+ feat(\([^)]*\))?(!)?: '
            emit_group "Fixes"       '^[0-9a-f]+ fix(\([^)]*\))?(!)?: '
            emit_group "Maintenance" '^[0-9a-f]+ chore(\([^)]*\))?(!)?: '
            emit_other
          } > notes.md
          cat notes.md

      # --generate-notes appends GitHub's PR-based section after the file body
      # (shaped by .github/release.yml once PRs are used).
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          PRERELEASE=""
          case "$TAG" in *-*) PRERELEASE="--prerelease";; esac
          gh release create "$TAG" \
            --verify-tag \
            --title "$TAG" \
            --notes-file notes.md \
            --generate-notes \
            $PRERELEASE
