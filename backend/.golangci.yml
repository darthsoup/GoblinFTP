# golangci-lint v2 — https://golangci-lint.run
# Run via `just lint-be` (or `golangci-lint run ./...` from backend/).
version: "2"

linters:
  default: standard # errcheck, govet, ineffassign, staticcheck, unused
  enable:
    - bodyclose # HTTP response bodies must be closed
    - copyloopvar # redundant loop-variable copies (Go ≥1.22)
    - errorlint # %w wrapping + errors.Is/As correctness
    - gocritic # opinionated correctness/style checks
    - gosec # security checks
    - intrange # `for i := range n` modernization
    - misspell
    - nilerr # returning nil after a non-nil error check
    - nolintlint # nolint directives must be well-formed + justified
    - sloglint # consistent log/slog usage
    - unconvert # unnecessary type conversions
    - usestdlibvars # http.MethodGet / http.StatusOK over literals
    - whitespace
  settings:
    misspell:
      locale: US
    nolintlint:
      require-explanation: true
      require-specific: true
  exclusions:
    presets:
      - common-false-positives
      - std-error-handling
    rules:
      # Tests favour brevity: unchecked writes to test buffers and
      # weak-randomness/file-path findings are fine there.
      - path: _test\.go
        linters:
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      # Keeps the existing std | external | internal import grouping.
      local-prefixes:
        - github.com/darthsoup/goblinftp
